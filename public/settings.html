<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings - Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script>
  </head>
  <body class="settings-page">
    <div class="settings-container">
      <h1>Dashboard Settings</h1>

      <div id="auth-section" class="settings-group">
        <h3>Firebase Account</h3>
        <p style="font-size: 13px; color: #a0a0a5; margin-bottom: 15px">
          Log in to sync your API keys across devices.
        </p>

        <label for="auth-email">Email:</label>
        <input type="email" id="auth-email" />

        <label for="auth-password">Password:</label>
        <input type="password" id="auth-password" />

        <div
          class="settings-actions"
          style="flex-direction: row; gap: 10px; margin-top: 15px"
        >
          <button id="login-btn" class="btn-primary" style="flex: 1">
            Login
          </button>
          <button id="register-btn" class="btn-secondary" style="flex: 1">
            Register
          </button>
        </div>
        <p
          id="auth-message"
          class="error-text"
          style="display: none; margin-top: 15px; text-align: center"
        ></p>
      </div>

      <div id="settings-section" class="hidden">
        <p
          id="auth-status-text"
          style="
            font-size: 14px;
            color: #32d74b;
            text-align: center;
            margin-bottom: 20px;
          "
        ></p>

        <div class="settings-group">
          <h3>Weather (OpenWeatherMap)</h3>
          <label for="input-weather-key">API Key:</label>
          <input
            type="password"
            id="input-weather-key"
            autocomplete="new-password"
          />

          <label for="input-lat">Latitude:</label>
          <input type="text" id="input-lat" />

          <label for="input-lon">Longitude:</label>
          <input type="text" id="input-lon" />

          <label for="input-units">Temperature Unit:</label>
          <select id="input-units">
            <option value="metric">Celsius (°C)</option>
            <option value="imperial">Fahrenheit (°F)</option>
          </select>
        </div>

        <div class="settings-group">
          <h3>Transit (HSL)</h3>
          <label for="input-transit-key">API Key:</label>
          <input
            type="password"
            id="input-transit-key"
            autocomplete="new-password"
          />

          <label for="input-stop-id"
            >Stop IDs (comma separated, e.g. HSL:1040129):</label
          >
          <input type="text" id="input-stop-id" />
        </div>

        <div class="settings-actions">
          <button id="save-btn" class="btn-primary">
            Save to Cloud & Reload
          </button>
          <button id="back-btn" class="btn-secondary">Back to Dashboard</button>
          <button
            id="logout-btn"
            class="btn-secondary"
            style="border-color: #ff453a; color: #ff453a; margin-top: 20px"
          >
            Logout & Clear Cache
          </button>
        </div>
      </div>
    </div>

    <script src="js/settings.js"></script>
  </body>
</html>
