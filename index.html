<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/clock.css" />
    <link rel="stylesheet" href="/css/weather.css" />
    <link rel="stylesheet" href="/css/transit.css" />
  </head>
  <body>
    <button id="nav-settings-btn" aria-label="Settings">⚙</button>

    <div id="app">
      <div class="dashboard-grid">
        <div class="col-left">
          <div class="top-row">
            <div id="widget-clock" class="widget"></div>

            <div
              id="widget-current"
              class="widget clickable"
              tabindex="0"
              role="button"
            >
              <p>Loading weather...</p>
            </div>
          </div>

          <div class="activities-row">
            <div
              id="widget-walking"
              class="widget clickable activity-widget"
              tabindex="0"
              role="button"
            ></div>
            <div
              id="widget-cycling"
              class="widget clickable activity-widget"
              tabindex="0"
              role="button"
            ></div>
          </div>
        </div>

        <div class="col-right">
          <div
            id="widget-hourly"
            class="widget clickable"
            tabindex="0"
            role="button"
          ></div>

          <div id="transit-module" class="widget retro-style">
            <h2>DEPARTURES</h2>
            <p>Loading transit data...</p>
          </div>
        </div>
      </div>
    </div>

    <div id="modal-overlay" class="hidden">
      <div
        id="modal-content"
        role="dialog"
        aria-modal="true"
        aria-label="Details"
      >
        <button id="modal-close" aria-label="Close">✕</button>
        <div id="modal-body"></div>
      </div>
    </div>

    <script type="module" src="/js/main.js"></script>
  </body>
</html>
