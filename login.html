<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Dashboard</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body class="settings-page">
    <div class="settings-container">
      <h1>Dashboard Login</h1>

      <div class="settings-group">
        <p
          style="
            font-size: 13px;
            color: #a0a0a5;
            margin-bottom: 15px;
            text-align: center;
          "
        >
          Log in to access and sync your dashboard.
        </p>

        <label for="auth-email">Email:</label>
        <input type="email" id="auth-email" />

        <label for="auth-password">Password:</label>
        <input type="password" id="auth-password" />

        <div
          class="settings-actions"
          style="flex-direction: row; gap: 10px; margin-top: 15px"
        >
          <button id="login-btn" class="btn-primary" style="flex: 1">
            Login
          </button>
          <button id="register-btn" class="btn-secondary" style="flex: 1">
            Register
          </button>
        </div>
        <p
          id="auth-message"
          class="error-text"
          style="display: none; margin-top: 15px; text-align: center"
        ></p>
      </div>
    </div>

    <script type="module" src="/js/auth.js"></script>
  </body>
</html>
